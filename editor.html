<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor Online</title>

  <link rel="stylesheet" href="style.css">

  <style>

    .editor-container {
      max-width: 1000px;
      margin: 50px auto;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 500px;
      padding: 20px;
      border: none;
      border-radius: 15px;
      resize: none;
      font-size: 18px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      outline: none;
    }

    .buttons {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .buttons button {
      padding: 15px 25px;
      border: none;
      background: black;
      color: white;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
    }

  </style>

</head>
<body>

<section class="hero">

  <h1>Editor Online</h1>

  <p>
    Crie e edite documentos online
  </p>

</section>

<div class="editor-container">

  <textarea
    id="editor"
    placeholder="Digite seu texto aqui..."
  ></textarea>

  <div class="buttons">

    <button onclick="salvarTXT()">
      Salvar TXT
    </button>

    <button onclick="baixarPDF()">
      Exportar PDF
    </button>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

function salvarTXT() {

  const texto =
    document.getElementById('editor').value;

  const blob =
    new Blob([texto], { type: 'text/plain' });

  const link =
    document.createElement('a');

  link.href =
    URL.createObjectURL(blob);

  link.download = 'documento.txt';

  link.click();
}

function baixarPDF() {

  const texto =
    document.getElementById('editor').value;

  const container =
    document.createElement('div');

  container.innerHTML =
    '<pre style=\"font-size:18px;\">' +
    texto +
    '</pre>';

  container.style.padding = '40px';

  html2pdf()
    .from(container)
    .save('documento.pdf');
}

</script>

</body>
</html>
