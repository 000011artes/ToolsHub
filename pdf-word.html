<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>PDF → Word</title>

<link rel="stylesheet" href="style.css">

<style>

.container {

  max-width: 900px;

  margin: 50px auto;
}

.box {

  background: white;

  padding: 40px;

  border-radius: 20px;

  box-shadow: 0 5px 20px rgba(0,0,0,0.1);

  text-align: center;
}

textarea {

  width: 100%;

  height: 300px;

  margin-top: 20px;

  padding: 20px;

  border-radius: 12px;

  border: 1px solid #ccc;

  font-size: 16px;
}

button {

  margin-top: 20px;

  padding: 15px 25px;

  border: none;

  background: black;

  color: white;

  border-radius: 12px;

  cursor: pointer;
}

</style>

</head>

<body>

<section class="hero">

<h1>📄 PDF → Word</h1>

<p>Converter PDF em texto editável</p>

</section>

<div class="container">

<div class="box">

<input
  type="file"
  id="pdfFile"
  accept=".pdf"
>

<br>

<button onclick="lerPDF()">
  Ler PDF
</button>

<button onclick="baixarWord()">
  Baixar Word
</button>

<textarea id="editor"></textarea>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>

async function lerPDF() {

  const arquivo =
    document.getElementById('pdfFile').files[0];

  if (!arquivo) {

    alert("Selecione um PDF");

    return;
  }

  const arrayBuffer =
    await arquivo.arrayBuffer();

  const pdf =
    await pdfjsLib
      .getDocument({
        data: arrayBuffer
      })
      .promise;

  let texto = '';

  for (
    let pagina = 1;
    pagina <= pdf.numPages;
    pagina++
  ) {

    const page =
      await pdf.getPage(pagina);

    const content =
      await page.getTextContent();

    const strings =
      content.items.map(
        item => item.str
      );

    texto +=
      strings.join(' ') + '\n\n';
  }

  document.getElementById('editor').value =
    texto;
}

function baixarWord() {

  const texto =
    document.getElementById('editor').value;

  const html = `
    <html>
    <body>
      <pre>${texto}</pre>
    </body>
    </html>
  `;

  const blob = new Blob(

    ['\ufeff', html],

    {
      type: 'application/msword'
    }

  );

  const url =
    URL.createObjectURL(blob);

  const link =
    document.createElement('a');

  link.href = url;

  link.download = "documento.doc";

  link.click();
}

</script>

</body>
</html>
