<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>PDF para Word</title>

  <link rel="stylesheet" href="style.css">

  <style>

    .container {

      max-width: 900px;

      margin: 50px auto;

      text-align: center;
    }

    .box {

      background: white;

      padding: 40px;

      border-radius: 20px;

      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .upload-area {

      display: inline-block;

      margin-top: 20px;

      padding: 20px 30px;

      border: 2px dashed #999;

      border-radius: 15px;

      background: #fafafa;

      cursor: pointer;
    }

    .upload-area input {

      display: none;
    }

    button {

      margin-top: 20px;

      padding: 15px 25px;

      border: none;

      background: black;

      color: white;

      border-radius: 12px;

      cursor: pointer;

      transition: 0.3s;
    }

    button:hover {

      transform: scale(1.05);
    }

    #statusWord {

      margin-top: 20px;

      font-weight: bold;
    }

  </style>

</head>

<body>

<section class="hero">

  <h1>📄 PDF → Word</h1>

  <p>
    Converta PDFs em documentos Word
  </p>

</section>

<div class="container">

  <div class="box">

    <label class="upload-area">

      <input
        type="file"
        id="pdfFile"
        accept=".pdf"
      >

      Selecionar arquivo PDF

    </label>

    <br>

    <button onclick="converterWord()">

      Converter para Word

    </button>

    <p id="statusWord"></p>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script>

async function converterWord() {

  const arquivo =
    document.getElementById('pdfFile').files[0];

  const status =
    document.getElementById('statusWord');

  if (!arquivo) {

    status.innerText =
      'Selecione um PDF';

    return;
  }

  status.innerText =
    'Convertendo PDF...';

  try {

    const arrayBuffer =
      await arquivo.arrayBuffer();

    const pdf =
      await pdfjsLib
        .getDocument({
          data: arrayBuffer
        })
        .promise;

    let texto = '';

    for (
      let pagina = 1;
      pagina <= pdf.numPages;
      pagina++
    ) {

      const page =
        await pdf.getPage(pagina);

      const content =
        await page.getTextContent();

      const strings =
        content.items.map(
          item => item.str
        );

      texto +=
        strings.join(' ') + '\n\n';
    }

    const paragrafos =

      texto
        .split('\n')
        .map(linha =>

          new docx.Paragraph({

            text: linha

          })

        );

    const doc =

      new docx.Document({

        sections: [{

          properties: {},

          children: paragrafos

        }]

      });

    const blob =
      await docx.Packer.toBlob(doc);

    saveAs(

      blob,

      arquivo.name.replace(
        '.pdf',
        '.docx'
      )

    );

    status.innerText =
      '✅ Word convertido com sucesso!';

  } catch (erro) {

    console.error(erro);

    status.innerText =
      '❌ Erro ao converter PDF';

  }

}

</script>

</body>
</html>
