<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF para Word</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">

  <h1>PDF → Word</h1>

  <p>Converta PDFs em Word</p>

  <label class="upload-area">

    <input
      type="file"
      id="pdfFile"
      accept=".pdf"
    >

    Selecionar arquivo PDF

  </label>

  <br>

  <button onclick="converterWord()">

    Converter para Word

  </button>

  <p id="statusWord"></p>

</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script>

async function converterWord() {

  const arquivo =
    document.getElementById('pdfFile').files[0];

  const status =
    document.getElementById('statusWord');

  if (!arquivo) {

    status.innerText =
      'Selecione um PDF';

    return;
  }

  status.innerText = 'Convertendo...';

  try {

    const arrayBuffer =
      await arquivo.arrayBuffer();

    const pdf =
      await pdfjsLib.getDocument({
        data: arrayBuffer
      }).promise;

    let texto = '';

    for (
      let pagina = 1;
      pagina <= pdf.numPages;
      pagina++
    ) {

      const page =
        await pdf.getPage(pagina);

      const content =
        await page.getTextContent();

      const strings =
        content.items.map(item => item.str);

      texto += strings.join(' ') + '\n\n';
    }

    const doc = new docx.Document({

      sections: [{

        properties: {},

        children: [

          new docx.Paragraph({
            text: texto
          })

        ]

      }]

    });

    const blob =
      await docx.Packer.toBlob(doc);

    saveAs(
      blob,
      arquivo.name.replace('.pdf', '.docx')
    );

    status.innerText =
      'Word convertido com sucesso!';

  } catch (erro) {

    console.error(erro);

    status.innerText =
      'Erro ao converter PDF';
  }
}

</script>

</body>
</html>
