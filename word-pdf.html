<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word para PDF</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">

  <h1>Word → PDF</h1>

  <p>Converta arquivos Word em PDF</p>

  <label class="upload-area">

    <input
      type="file"
      id="wordFile"
      accept=".docx"
    >

    Selecionar arquivo Word

  </label>

  <br>

  <button onclick="converterPDF()">
    Converter para PDF
  </button>

  <p id="status"></p>

</section>

<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

async function converterPDF() {

  const arquivo =
    document.getElementById('wordFile').files[0];

  const status =
    document.getElementById('status');

  if (!arquivo) {

    status.innerText =
      'Selecione um arquivo Word';

    return;
  }

  status.innerText = 'Convertendo...';

  try {

    const arrayBuffer =
      await arquivo.arrayBuffer();

    const resultado =
      await mammoth.convertToHtml({
        arrayBuffer: arrayBuffer
      });

    const html = resultado.value;

    const container =
      document.createElement('div');

    container.innerHTML = html;

    container.style.padding = '40px';

    await html2pdf()
      .from(container)
      .save();

    status.innerText =
      'PDF convertido com sucesso!';

  } catch (erro) {

    console.error(erro);

    status.innerText =
      'Erro ao converter Word';
  }
}

</script>

</body>
</html>
